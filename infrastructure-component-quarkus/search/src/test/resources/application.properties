# 启用 search 插件：ESService 的 @IfBuildProperty 构建期开关
quarkus.plugins.search.enable=true

# Elasticsearch Dev Services：测试期由 Quarkus 通过本机 Docker 自动拉起 ES 容器。
# 不配置 quarkus.elasticsearch.hosts，Dev Services 即自动激活并注入 ElasticsearchClient。
# 镜像版本与 Quarkus BOM 内置的 ES Java Client (9.1.5) 对齐。
quarkus.elasticsearch.devservices.image-name=docker.elastic.co/elasticsearch/elasticsearch:9.1.5
