# Java Util Logging configuration for workflow Temporal tests.
# Loaded by the Gradle test task through java.util.logging.config.file.

handlers=java.util.logging.ConsoleHandler
.level=INFO
java.util.logging.ConsoleHandler.level=ALL
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=%1$tH:%1$tM:%1$tS.%1$tL [%4$s] %3$s - %5$s%6$s%n

org.carl.infrastructure.workflow.level=FINE
